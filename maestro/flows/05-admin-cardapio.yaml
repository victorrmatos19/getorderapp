# Suite 10 (S10) — cardápio: produtos + categorias + adicionais (grupos de modificadores).
# ⚠️ Os formulários (ProdutoForm/GrupoForm) são RN Modal → conteúdo não assertável pelo Maestro;
#    a criação de grupo + vínculo ao produto é verificada manualmente (ver README).
appId: com.optmore.getorder.staff
---
- runFlow:
    file: ../helpers/login.yaml
    env: { EMAIL: "637@admin.com", SENHA: "teste1234" }
- extendedWaitUntil:
    visible:
      id: "tab-cardapio"
    timeout: 30000
- tapOn:
    id: "tab-cardapio"
- assertVisible: "Produtos"
- assertVisible: "Categorias"
# aba Categorias
- tapOn: "Categorias"
- assertVisible: "Categorias"
# aba Adicionais (grupos de adicionais — feature portada): renderiza com o botão de novo grupo
- tapOn:
    id: "cardapio-tab-adicionais"
- assertVisible: "\\+ Novo grupo"
