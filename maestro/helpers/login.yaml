# Subflow de login reutilizável. Parametrizado por EMAIL/SENHA via runFlow env.
# Ex.: runFlow: { file: ../helpers/login.yaml, env: { EMAIL: 637@admin.com, SENHA: teste1234 } }
# Roda sobre o build RELEASE (JS embutido, sem dev-launcher/Metro) → abre direto no app.
appId: com.optmore.getorder.staff
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Entrar"
    timeout: 45000
- tapOn:
    id: "login-email"
- inputText: "${EMAIL}"
- tapOn:
    id: "login-senha"
- inputText: "${SENHA}"
# Android: o teclado cobre o botão "Entrar" → dispensa antes de tocar.
# ⚠️ SÓ no Android: no driver iOS o hideKeyboard NÃO é no-op — falha com
# "Couldn't hide the keyboard" e derruba o flow (foi 11/11 FAIL em 01/07).
- runFlow:
    when:
      platform: Android
    commands:
      - hideKeyboard
- tapOn:
    id: "login-entrar"
# iOS pode mostrar "Salvar Senha?" COM ATRASO após o login (race) → espera assentar e dispensa.
# Faz 2 tentativas (o diálogo às vezes surge só durante a navegação) — tudo opcional, nunca falha.
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Agora Não"
    optional: true
- extendedWaitUntil:
    notVisible:
      text: "Salvar Senha"
    timeout: 4000
    optional: true
- tapOn:
    text: "Agora Não"
    optional: true
